<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillUp Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&family=Baloo+2&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles-contacto.css">
</head>
<body>
    <header>
        <div class="logo">
            <img class="main-logo" src="assets/logo.png" alt="logo">
            <nav id="main-nav" aria-label="Navegacion Principal">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="game-ideas.html">Game-ideas</a></li>
                    <li><a href="mentores.html">Mentores</a></li>
                    <li><a href="contacto.html" aria-current="page">Contacto</a></li>
            </ul>
            </nav>
        </div>
    </header>

    <main id="contenido">
        <div class="content">
            <h2>Escríbenos</h2>
            <p>Llena tus datos para recibir información de los mejores estrenos y donde verlos, o haz tus
            consultas.</p>
            <form class="form" action="#" method="post">
            <div class="field">Nombre<input id="nombre" name="nombre"
                placeholder="Tu nombre" required /></div>
            <div class="field">Correo<input id="correo" name="correo" type="email"
                placeholder="tu@correo.com" required /></div>
            <div class="field">Número telefónico<input id="teléfono" name="teléfono" type="tel"
                placeholder="00000000" required /></div>
        <div class="field">Mensaje<textarea id="mensaje" name="mensaje"
                placeholder="Escribe tu mensaje..."></textarea></div>
            <div class="actions"><button class="btn primary" type="submit">Enviar</button><a class="btn"
                href="index.html">Volver</a></div>
        </div>
        </section>
    </main>

    <footer>
        <p>SkillUp Academy 2026</p>
    </footer>
    
</body>
</html>
